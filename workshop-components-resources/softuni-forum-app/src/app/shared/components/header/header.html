<header>
    <div class="mini-navbar-wrap">
        <div class="logo-wrap">
            <img src="/logo.png" />
            <p class="logo">SoftUni Forum</p>
        </div>
        <div class="mini-navbar">
            <ul>
                @if(authService.isLoggedIn()){

                <li>
                    <a routerLink="/profile">{{authService.currentUser()?.username}}'s profile!</a>
                </li>
                <li>
                    <a (click)="authService.logout()">Logout</a>
                </li>
                } @else {
                <li>
                    <a routerLink="/register">Register</a>
                </li>
                      <li>
                    <a routerLink="/login">Login</a>
                </li>

                }

            </ul>
        </div>
    </div>
    <nav>
        <ul>
            <li>
                <a>Home</a>
            </li>
            <li>
                <a>Themes</a>
            </li>
            <li>
                <a>New Theme</a>
            </li>
        </ul>
    </nav>
</header>
